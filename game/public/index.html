<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalndar</title>
<link rel="icon" href="icons/favicon.ico" type="image/x-icon">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3B82F6">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="identityScreen" class="screen hidden">
  <div class="identity-card">
    <h1 id="identityHeading">Qui es-tu ?</h1>
    <div id="identityList" class="identity-list"></div>

    <form id="loginForm" class="login-form hidden">
      <p id="loginAs"></p>
      <label>
        Mot de passe
        <input type="password" id="loginPassword" required>
      </label>
      <p id="loginError" class="form-error hidden"></p>
      <div class="login-actions">
        <button type="button" id="loginBackBtn" class="secondary-btn">‹ Retour</button>
        <button type="submit" class="primary-btn">Entrer</button>
      </div>
    </form>
  </div>
</div>

<div id="appScreen" class="screen hidden">
  <header class="topbar">
    <div class="topbar-left">
      <h1>kal'n'dar</h1>
    </div>
    <div class="topbar-right">
      <div id="memberFilters" class="member-checkboxes"></div>
    </div>
  </header>

  <div class="app-layout">
    <div class="calendar-main">
      <div class="toolbar">
        <div class="nav-group">
          <button id="prevMonthBtn" class="icon-btn" aria-label="Mois précédent">‹</button>
          <button id="todayBtn" class="today-btn">Aujourd'hui</button>
          <button id="nextMonthBtn" class="icon-btn" aria-label="Mois suivant">›</button>
        </div>
        <h2 id="monthLabel" class="month-label"></h2>
      </div>

      <div class="weekdays" id="weekdaysRow"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <aside class="day-panel">
      <div class="day-panel-header">
        <h2 id="dayPanelDate"></h2>
        <button id="dayPanelAddBtn" class="day-panel-add-btn" aria-label="Ajouter un événement"></button>
      </div>
      <div class="day-panel-list" id="dayPanelList"></div>
    </aside>
  </div>
</div>

<div id="eventModalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">Nouvel événement</h2>
    <form id="eventForm">
      <label>
        Titre
        <input type="text" id="fieldTitle" required maxlength="200" placeholder="Nom de l'événement" autocomplete="off">
      </label>
      <div class="notify-row">
        <span class="notify-row-label">Rappel avant l'événement</span>
        <div class="notify-options" id="notifyOptions">
          <button type="button" class="notify-option" data-minutes="1440">24h</button>
          <button type="button" class="notify-option" data-minutes="60">1h</button>
          <button type="button" class="notify-option" data-minutes="15">15min</button>
          <button type="button" class="notify-option" data-minutes="0">0min</button>
          <button type="button" class="notify-option" id="notifyOtherBtn">Autre</button>
        </div>
        <button type="button" class="notify-clear-btn disabled" id="notifyClearBtn" aria-label="Annuler le rappel"></button>
        <div class="notify-other-popup hidden" id="notifyOtherPopup">
          <div class="notify-other-fields">
            <label>
              Jours
              <input type="number" id="notifyOtherDays" min="0" value="0">
            </label>
            <label>
              Heures
              <input type="number" id="notifyOtherHours" min="0" value="0">
            </label>
            <label>
              Minutes
              <input type="number" id="notifyOtherMinutes" min="0" value="0">
            </label>
          </div>
          <button type="button" id="notifyOtherConfirm" class="primary-btn">OK</button>
        </div>
      </div>
      <label>
        Membres concernés
        <div id="fieldMembers" class="member-checkboxes"></div>
      </label>
      <div class="field-row">
        <label>
          Date de début
          <input type="date" id="fieldDate" required>
        </label>
        <label>
          Date de fin (optionnel)
          <input type="date" id="fieldEndDate">
        </label>
      </div>
      <div class="field-row">
        <label>
          Heure de début (optionnel)
          <input type="text" id="fieldStartTime" inputmode="numeric" placeholder="HH:mm" maxlength="5">
        </label>
        <label>
          Heure de fin (optionnel)
          <input type="text" id="fieldEndTime" inputmode="numeric" placeholder="HH:mm" maxlength="5">
        </label>
      </div>
      <label>
        Description (optionnel)
        <textarea id="fieldDescription" rows="3" maxlength="2000"></textarea>
      </label>
      <p id="formError" class="form-error hidden"></p>
      <div class="modal-actions">
        <button type="button" id="deleteEventBtn" class="danger-btn hidden">Supprimer</button>
        <div class="modal-actions-right">
          <button type="button" id="cancelModalBtn" class="secondary-btn">Annuler</button>
          <button type="submit" class="primary-btn">Enregistrer</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
